server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Service Worker + Manifest: IMMER frisch vom Server holen
    location ~* ^/(service-worker\.js|service-worker-assets\.js|manifest\.webmanifest)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    # index.html: nie cachen (SPA-Einstiegspunkt)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Fingerprinted Assets (_framework/*): lang cachen
    location /_framework/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Alles andere: SPA Fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}