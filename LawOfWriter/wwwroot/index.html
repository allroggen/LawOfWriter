<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LawOfWriter</title>
  <base href="/"/>
  <link rel="preload" id="webassembly"/>
  <link rel="stylesheet" href="css/app.css"/>
  <!-- If you add any scoped CSS files, uncomment the following to load them
  <link href="LawOfWriter.styles.css" rel="stylesheet" /> -->
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link href="manifest.webmanifest" rel="manifest"/>
  <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png"/>
  <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png"/>
  <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet"/>
  <!-- Important: Increment the version parameter whenever you update MudBlazor to prevent caching issues -->
  <link href="_content/MudBlazor/MudBlazor.min.css?v=1" rel="stylesheet"/>
  <script type="importmap"></script>
</head>

<body>
<div id="app">
  <svg class="loading-progress">
    <circle r="40%" cx="50%" cy="50%"/>
    <circle r="40%" cx="50%" cy="50%"/>
  </svg>
  <div class="loading-progress-text"></div>
</div>

<div id="blazor-error-ui">
  An unhandled error has occurred.
  <a href="." class="reload">Reload</a>
  <span class="dismiss">🗙</span>
</div>

<script>
  // Debug: Confirm console is working
  console.log('%c🚀 LawOfWriter App Loading...', 'color: green; font-size: 16px; font-weight: bold;');
  console.log('Browser console is active and ready for debugging');
</script>

<!-- Important: Increment the version parameter whenever you update MudBlazor to prevent caching issues -->
<script src="_content/MudBlazor/MudBlazor.min.js?v=1"></script>
<!-- autostart="false" so we can intercept SW registration before Blazor starts -->
<script src="_framework/blazor.webassembly#[.{fingerprint}].js" autostart="false"></script>
<script>
  window._waitingServiceWorker = null;
  window._blazorUpdateDotNetRef = null;
  window._pendingUpdateNotification = false;

  // Called by Blazor (MainLayout.OnAfterRenderAsync) to register the .NET callback ref
  window.registerBlazorUpdateCallback = function (dotNetRef) {
    window._blazorUpdateDotNetRef = dotNetRef;
    console.log('%c✅ Blazor update callback registered', 'color: green;');
    // If an update was already detected before Blazor was ready, fire it now
    if (window._pendingUpdateNotification) {
      window._pendingUpdateNotification = false;
      dotNetRef.invokeMethodAsync('NotifyUpdateAvailable')
        .catch(err => console.warn('Pending update notification failed:', err));
    }
  };

  // Called by Blazor (JSInterop) to apply the update and reload
  window.applyServiceWorkerUpdate = function () {
    if (window._waitingServiceWorker) {
      console.log('%c⬆️ Applying SW update...', 'color: orange; font-weight: bold;');
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        console.log('%c✅ New version active – reloading', 'color: green; font-weight: bold;');
        location.reload();
      });
      window._waitingServiceWorker.postMessage({ type: 'SKIP_WAITING' });
      window._waitingServiceWorker = null;
    }
  };

  function notifyBlazorUpdateAvailable() {
    if (window._blazorUpdateDotNetRef) {
      window._blazorUpdateDotNetRef.invokeMethodAsync('NotifyUpdateAvailable')
        .then(() => console.log('%c✅ Blazor notified of SW update', 'color: green;'))
        .catch(err => console.warn('SW update notification failed:', err));
    } else {
      // Blazor not rendered yet – queue it, registerBlazorUpdateCallback will send it
      console.log('%c⏳ Blazor not ready yet, queuing update notification...', 'color: gray;');
      window._pendingUpdateNotification = true;
    }
  }

  function handleWaitingWorker(worker) {
    if (window._waitingServiceWorker) return;
    console.log('%c🔔 New SW version waiting!', 'color: blue; font-weight: bold;');
    window._waitingServiceWorker = worker;
    notifyBlazorUpdateAvailable();
  }

  function attachUpdateListeners(reg) {
    if (reg.waiting) {
      handleWaitingWorker(reg.waiting);
    }

    reg.addEventListener('updatefound', () => {
      console.log('%c🔍 SW updatefound – new worker installing...', 'color: purple;');
      const newWorker = reg.installing;
      newWorker.addEventListener('statechange', () => {
        console.log('%c   SW state:', 'color: purple;', newWorker.state);
        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
          handleWaitingWorker(newWorker);
        }
      });
    });

    // Poll every 60 s – critical for iPad PWAs staying open in background
    setInterval(() => {
      reg.update().catch(err => console.warn('SW poll failed:', err));
    }, 60 * 1000);

    // Check immediately when user returns to the app
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) {
        console.log('%c👀 App visible – polling for SW update', 'color: gray;');
        reg.update().catch(err => console.warn('SW update check failed:', err));
      }
    });
  }

  // Intercept navigator.serviceWorker.register BEFORE Blazor calls it
  if ('serviceWorker' in navigator) {
    const _originalRegister = navigator.serviceWorker.register.bind(navigator.serviceWorker);
    navigator.serviceWorker.register = function (scriptURL, options) {
      console.log('%c📦 SW register intercepted:', 'color: gray;', scriptURL);
      const mergedOptions = { ...(options || {}), updateViaCache: 'none' };
      return _originalRegister(scriptURL, mergedOptions).then(reg => {
        console.log('%c📦 SW registered:', 'color: gray;', scriptURL);
        attachUpdateListeners(reg);
        return reg;
      });
    };
  }

  // Start Blazor manually – it will now call our intercepted register()
  Blazor.start();
</script>
</body>

</html>
