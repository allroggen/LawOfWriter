name: GitHub → Azure Auto-Sync

on:
  push:
    branches:
      - master
      - main

jobs:
  sync-to-azure:
    runs-on: ubuntu-latest

    env:
      AZURE_PAT: ${{ secrets.AZURE_PAT }}
      AZURE_DEVOPS_EXT_PAT: ${{ secrets.AZURE_PAT }}

    steps:
      # 1️⃣ GitHub Repo auschecken
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Azure Repo hinzufügen
      - name: Add Azure remote
        run: |
          git remote add azure https://$AZURE_PAT@dev.azure.com/licht85/LawOfWriter/_git/LawOfWriter
          git fetch azure

      # 2.5️⃣ Azure DevOps CLI konfigurieren
      - name: Configure Azure DevOps defaults
        run: |
          az devops configure --defaults organization=https://dev.azure.com/licht85 project=LawOfWriter

      # 3️⃣ Neuen Sync-Branch erstellen
      - name: Create sync branch
        run: |
          BRANCH="sync-to-azure"
          git checkout -B $BRANCH
          git push -u azure $BRANCH --force

      # 4️⃣ PR in Azure erstellen
      - name: Create PR in Azure DevOps
        run: |
          PR_ID=$(az repos pr list \
            --repository LawOfWriter \
            --source-branch sync-to-azure \
            --status active \
            --query "[0].pullRequestId" -o tsv)
          if [ -z "$PR_ID" ] || [ "$PR_ID" = "None" ]; then
            az repos pr create \
              --repository LawOfWriter \
              --source-branch sync-to-azure \
              --target-branch master \
              --title "GitHub → Azure Sync" \
              --description "Automatisch erstellter PR von GitHub"
          fi

      # 5️⃣ Automatisches Mergen, wenn keine Konflikte
      - name: Auto merge PR if no conflicts
        run: |
          PR_ID=$(az repos pr list \
            --repository LawOfWriter \
            --source-branch sync-to-azure \
            --status active \
            --query "[0].pullRequestId" -o tsv)
          if [ -n "$PR_ID" ] && [ "$PR_ID" != "None" ]; then
            az repos pr update --id $PR_ID --auto-complete true --squash true
          fi

      # 6️⃣ Optional: alte Sync-Branches löschen
      - name: Cleanup old sync branches in Azure
        run: |
          BRANCHES=$(az repos ref list --repository LawOfWriter --filter "refs/heads/sync-to-azure" --query "[].name" -o tsv)
          for b in $BRANCHES; do
            if [ "$b" != "refs/heads/sync-to-azure" ]; then
              git push azure --delete "${b#refs/heads/}" || true
            fi
          done
